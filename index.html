<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover" />
  <title>FaceBoard AR - Shadow Edition</title>

  <!-- A-Frame / AR.js -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js@3.4.2/aframe/build/aframe-ar.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #debug-info {
      position: fixed;
      bottom: calc(10px + env(safe-area-inset-bottom));
      left: 10px;
      color: white;
      background: rgba(0,0,0,0.52);
      font-size: 11px;
      z-index: 10000;
      pointer-events: none;
      padding: 7px 9px;
      border-radius: 8px;
      white-space: pre-line;
      max-width: calc(100vw - 20px);
    }
  </style>
</head>

<body>

<div id="debug-info">モード: 自由配置（Manual）</div>

<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false;"
  renderer="precision: mediump; antialias: true; colorManagement: true;"
>

  <!-- 太陽光 -->
  <a-light type="directional"
           position="-1 4 2"
           intensity="1.2"
           castShadow="true">
  </a-light>

  <!-- 環境光 -->
  <a-light type="ambient" color="#FFF" intensity="1.2"></a-light>

  <a-camera></a-camera>

  <!-- 船モデル（絶対パス） -->
  <a-entity id="ship"
            gltf-model="https://marunonbe.github.io/FaceBoardAR/models/Cafe-v1.glb"
            position="0 -0.5 -2"
            rotation="0 180 0"
            scale="0.8 0.8 0.8">
  </a-entity>

  <!-- 顔出し看板モデル（絶対パス） -->
  <a-entity id="face-board"
            gltf-model="https://marunonbe.github.io/FaceBoardAR/models/Barnic_Face_Hole.glb"
            position="0 0 -1.5"
            rotation="0 180 0"
            scale="0.8 0.8 0.8"
            shadow="cast: true;">
  </a-entity>

  <!-- 影を受ける透明地面 -->
  <a-plane id="shadow-ground"
           position="0 -0.01 -1.5"
           rotation="-90 0 0"
           width="10"
           height="10"
           material="color: #ffffff; opacity: 0"
           shadow="receive: true">
  </a-plane>

</a-scene>

</body>
</html>
